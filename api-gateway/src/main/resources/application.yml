server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/accounts/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/customers/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


